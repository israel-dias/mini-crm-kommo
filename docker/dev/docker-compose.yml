services:
  db:
    image: postgres:16
    container_name: mini_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mini_crm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    container_name: mini_crm_web
    restart: unless-stopped
    env_file:
      - ../../.env
    command: /app/docker/entrypoints/web.sh
    volumes:
      - ../..:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

volumes:
  postgres_dev_data:
