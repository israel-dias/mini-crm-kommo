services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kommo
      POSTGRES_USER: kommo
      POSTGRES_PASSWORD: kommo  # pragma: allowlist secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_NAME: kommo
      DB_USER: kommo
      DB_PASSWORD: kommo  # pragma: allowlist secret
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
