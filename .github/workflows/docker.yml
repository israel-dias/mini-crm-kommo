name: Docker Build

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dev image
        run: docker build -f docker/dev/Dockerfile -t mini-crm-dev .

      - name: Build prod image
        run: docker build -f docker/prod/Dockerfile -t mini-crm-prod .
