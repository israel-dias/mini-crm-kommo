name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ci_test_db
          POSTGRES_USER: ci_test_user
          POSTGRES_PASSWORD: ci_test_password # pragma: allowlist secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci_test_user -d ci_test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci_dummy_secret_key # pragma: allowlist secret
      TEST_DB_NAME: ci_test_db
      TEST_DB_USER: ci_test_user
      TEST_DB_PASSWORD: ci_test_password # pragma: allowlist secret
      TEST_DB_HOST: localhost
      TEST_DB_PORT: 5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        run: python manage.py check

      - name: Run tests
        run: pytest
